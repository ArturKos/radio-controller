esphome:
  name: radio-controller
  friendly_name: "RF Radio Controller"

esp8266:
  board: nodemcuv2

# WiFi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  fast_connect: true
  power_save_mode: none
  output_power: 20dB

  # Fallback hotspot
  ap:
    ssid: "Radio-Controller"
    password: "UsxSPRmmyB8Q"

captive_portal:

# Home Assistant API
api:
  encryption:
    key: !secret api_key

# OTA updates
ota:
  - platform: esphome
    password: !secret ota_password

# Logging
logger:
  level: DEBUG

# Web server for diagnostics
web_server:
  port: 80

# SPI bus for CC1101
spi:
  clk_pin: D5
  mosi_pin: D7
  miso_pin: D6

# CC1101 transceiver — native ESPHome component
# Single GDO0 pin (D2) shared for both RX and TX
cc1101:
  cs_pin: D8
  gdo0_pin:
    number: D2
    allow_other_uses: true
  frequency: 433.92MHz
  modulation_type: ASK/OOK
  symbol_rate: 5000
  filter_bandwidth: 203kHz

# RF Receiver — GDO0 (D2)
# Listens for all 433MHz signals: remotes, weather stations, door sensors, etc.
remote_receiver:
  pin:
    number: D2
    allow_other_uses: true
    mode: INPUT_PULLUP
  dump:
    - rc_switch
  tolerance: 60%
  filter: 200us
  idle: 4ms
  on_rc_switch:
    then:
      - lambda: |-
          // Filter out protocol 2 noise (spurious code=0x0 from RF interference)
          if (x.protocol == 2 && x.code == 0) return;

          // Count valid signals only
          id(rf_signal_count) += 1;

          // Store last code for HA display
          char buf[80];
          snprintf(buf, sizeof(buf), "P%d: 0x%llX", x.protocol, x.code);
          id(last_rf_code) = buf;

          // Log for discovery — watch these logs to find weather stations & sensors
          ESP_LOGI("rf_monitor", "RC Switch: protocol=%d code=0x%llX",
                   x.protocol, x.code);

          // --- ADD YOUR DOOR/WINDOW SENSOR CODES HERE ---
          // Example (use hex codes from logs):
          // if (x.protocol == 1 && x.code == 0x3543FC0) {
          //   id(door_sensor_1_state) = true;
          //   id(front_door).publish_state(true);
          // }

# RF Transmitter — GDO0 (D2)
# on_transmit/on_complete switch CC1101 between TX and RX modes
remote_transmitter:
  pin:
    number: D2
    allow_other_uses: true
  carrier_duty_percent: 100%
  on_transmit:
    then:
      - cc1101.begin_tx
  on_complete:
    then:
      - cc1101.begin_rx

