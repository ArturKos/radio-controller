# =============================================================================
# RF ACTIVITY MONITORING
# =============================================================================
# Tracks all 433MHz activity — weather stations, door sensors, remotes, etc.
# Unknown devices appear in logs; known devices get dedicated HA sensors.

globals:
  # RF activity counter
  - id: rf_signal_count
    type: int
    restore_value: no
    initial_value: '0'
  # Last received code + protocol (for HA text sensor)
  - id: last_rf_code
    type: std::string
    restore_value: no
    initial_value: '""'
  # Door/window sensor states — add your sensor codes here after sniffing
  # Example: a door sensor sends one code when open, another when closed
  - id: door_sensor_1_state
    type: bool
    restore_value: no
    initial_value: 'false'

sensor:
  # WiFi signal strength
  - platform: wifi_signal
    name: "Radio Controller WiFi Signal"
    update_interval: 60s

  # Uptime
  - platform: uptime
    name: "Radio Controller Uptime"

  # RF signals received counter — resets daily
  - platform: template
    name: "RF Signals Received"
    icon: "mdi:radio-tower"
    id: rf_counter_sensor
    lambda: |-
      return id(rf_signal_count);
    update_interval: 10s

text_sensor:
  # Last received RF code — visible in HA for debugging/discovery
  - platform: template
    name: "Last RF Code"
    icon: "mdi:broadcast"
    id: last_rf_code_sensor
    lambda: |-
      return id(last_rf_code);
    update_interval: 5s

  # ESPHome version
  - platform: version
    name: "Radio Controller ESPHome Version"

binary_sensor:
  # Door/window sensor example — UNCOMMENT and set your codes after sniffing
  # When you see a door sensor code in logs, add it here:
  #
  # - platform: template
  #   name: "Front Door"
  #   device_class: door
  #   id: front_door
  #   lambda: |-
  #     return id(door_sensor_1_state);
  #
  # Then in the on_rc_switch lambda above, add:
  #   if (x.code == "YOUR_DOOR_OPEN_CODE") id(door_sensor_1_state) = true;
  #   if (x.code == "YOUR_DOOR_CLOSED_CODE") id(door_sensor_1_state) = false;
  #   id(front_door).publish_state(id(door_sensor_1_state));

  # Connection status
  - platform: status
    name: "Radio Controller Status"

# Reset RF counter at midnight
time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - lambda: |-
              id(rf_signal_count) = 0;

# =============================================================================
# RF SIGNAL PROCESSOR
# =============================================================================
# This interval checks for patterns in received signals.
# Weather stations typically transmit every 30-60 seconds with a fixed prefix.
# Door sensors transmit on open/close events.
#
# HOW TO USE:
# 1. Flash this config and watch the logs
# 2. Look for repeating codes — those are likely weather stations or sensors
# 3. Note the code prefix (first ~16 bits are usually the device ID)
# 4. Add dedicated sensors below for recognized devices
#
# Example log entries you might see:
#   [rf_monitor] RC Switch: protocol=1 code=010101100110001010110010
#   ^^^^^^^^^^^^^^^^ if this repeats every 30-60s, it's likely a weather station
#
# Weather station codes typically encode:
#   - Device ID (first 8-12 bits)
#   - Channel (2 bits)
#   - Temperature (12 bits, often offset by 400 or as BCD)
#   - Humidity (8 bits)
#   - Battery status (1 bit)
# =============================================================================
